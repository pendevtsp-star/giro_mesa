services:
  postgres:
    image: postgres:16-alpine
    container_name: giromesa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: giromesa
      POSTGRES_PASSWORD: giromesa
      POSTGRES_DB: giromesa
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U giromesa -d giromesa"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: giromesa-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
