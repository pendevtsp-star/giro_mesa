name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: giro-mesa-production
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "11.7.0"
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: pendevtsp-star
  API_IMAGE: ghcr.io/pendevtsp-star/giro-mesa-api
  WEB_IMAGE: ghcr.io/pendevtsp-star/giro-mesa-web
  WORKER_IMAGE: ghcr.io/pendevtsp-star/giro-mesa-worker
  DATABASE_URL: postgres://giromesa:giromesa@localhost:5432/giromesa
  REDIS_URL: redis://localhost:6379
  API_URL: http://127.0.0.1:3333
  NEXT_PUBLIC_API_URL: http://127.0.0.1:3333
  WEB_URL: http://127.0.0.1:3004
  APP_URL: http://127.0.0.1:3004
  PUBLIC_APP_URL: http://127.0.0.1:3004
  SESSION_SECRET: ci-session-secret-change-in-production
  PASSWORD_PEPPER: ci-password-pepper-change-in-production
  MFA_SECRET_ENCRYPTION_KEY: ci-mfa-secret-change-in-production
  SMTP_HOST: smtp.example.com
  SMTP_PORT: "587"
  SMTP_SECURE: "false"
  SMTP_USER: ci
  SMTP_PASSWORD: ci
  EMAIL_FROM: no-reply@example.com

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: giromesa
          POSTGRES_PASSWORD: giromesa
          POSTGRES_DB: giromesa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U giromesa -d giromesa"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Lint
        run: pnpm lint

      - name: Copy lint
        run: pnpm lint:copy

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Apply migrations
        run: pnpm db:migrate

      - name: Seed demo data for E2E
        run: pnpm --filter @giromesa/db db:seed

      - name: Integration tests
        run: pnpm test:integration

      - name: Build
        run: pnpm build

      - name: E2E
        run: pnpm test:e2e

  publish-images:
    name: Publish Images
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 45
    outputs:
      api_image: ${{ steps.tags.outputs.api_image }}
      web_image: ${{ steps.tags.outputs.web_image }}
      worker_image: ${{ steps.tags.outputs.worker_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          echo "api_image=${API_IMAGE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "web_image=${WEB_IMAGE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "worker_image=${WORKER_IMAGE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.api_image }}

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.web_image }}
          build-args: |
            NEXT_PUBLIC_API_URL=/api

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.worker_image }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: publish-images
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deploy target
        id: target
        run: |
          raw_host="${{ secrets.VPS_HOST }}"
          raw_user="${{ secrets.VPS_USER }}"
          raw_port="${{ secrets.VPS_PORT }}"
          target="${raw_host#ssh }"
          target="${target#ssh://}"
          target="${target%%/*}"
          embedded_user=""
          if [[ "$target" == *@* ]]; then
            embedded_user="${target%@*}"
            target="${target#*@}"
          fi
          host="${target%%:*}"
          port="${raw_port:-22}"
          if [[ "$target" == *:* ]]; then
            maybe_port="${target##*:}"
            if [[ "$maybe_port" =~ ^[0-9]+$ ]]; then
              port="$maybe_port"
            fi
          fi
          user="${raw_user:-$embedded_user}"
          user="${user:-root}"
          if [[ -z "$host" ]]; then
            echo "VPS_HOST is empty after normalization." >&2
            exit 1
          fi
          echo "host=$host" >> "$GITHUB_OUTPUT"
          echo "port=$port" >> "$GITHUB_OUTPUT"
          echo "user=$user" >> "$GITHUB_OUTPUT"

      - name: Prepare SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 20 -p "${{ steps.target.outputs.port }}" -H "${{ steps.target.outputs.host }}" >> ~/.ssh/known_hosts

      - name: Copy compose files
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ steps.target.outputs.port }}" "${{ steps.target.outputs.user }}@${{ steps.target.outputs.host }}" \
            "mkdir -p /srv/apps/giro_mesa/backups"
          scp -i ~/.ssh/deploy_key -P "${{ steps.target.outputs.port }}" docker-compose.prod.yml docker-compose.ghcr.yml scripts/deploy/ghcr-production.sh \
            "${{ steps.target.outputs.user }}@${{ steps.target.outputs.host }}:/srv/apps/giro_mesa/"

      - name: Deploy on VPS
        run: |
          {
            printf 'export GHCR_USERNAME=%q\n' "$GHCR_USERNAME"
            printf 'export GHCR_TOKEN_GIRO_MESA=%q\n' "$GHCR_TOKEN_GIRO_MESA"
            printf 'export API_IMAGE_SHA=%q\n' "$API_IMAGE_SHA"
            printf 'export WEB_IMAGE_SHA=%q\n' "$WEB_IMAGE_SHA"
            printf 'export WORKER_IMAGE_SHA=%q\n' "$WORKER_IMAGE_SHA"
            printf 'export DEPLOY_SHA=%q\n' "$GITHUB_SHA"
            echo 'cd /srv/apps/giro_mesa'
            echo 'chmod 700 ghcr-production.sh'
            echo './ghcr-production.sh'
          } | ssh -i ~/.ssh/deploy_key -p "${{ steps.target.outputs.port }}" "${{ steps.target.outputs.user }}@${{ steps.target.outputs.host }}" bash -s
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN_GIRO_MESA: ${{ secrets.GHCR_TOKEN_GIRO_MESA }}
          API_IMAGE_SHA: ${{ needs.publish-images.outputs.api_image }}
          WEB_IMAGE_SHA: ${{ needs.publish-images.outputs.web_image }}
          WORKER_IMAGE_SHA: ${{ needs.publish-images.outputs.worker_image }}

  notify-telegram:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs: [validate, publish-images, deploy]
    if: always()
    steps:
      - name: Notify
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ needs.deploy.result }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${BOT_TOKEN}" ] || [ -z "${CHAT_ID}" ]; then
            echo "Telegram secrets not configured; skipping notification."
            exit 0
          fi
          TEXT="GiroMesa deploy production: ${STATUS}%0ACommit: ${SHA}%0ARun: ${RUN_URL}"
          curl --fail --silent --show-error \
            "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${TEXT}"
